<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập hệ thống</title>

    <link rel="stylesheet"
          href="../css/style2.css">

</head>

<body>

    <div class="container">

        <form id="frmLogin">

            <h2 id="title">Đăng nhập</h2>

            <div class="form-group">

                <label for="txtUsername">
                    Tài khoản:
                </label>

                <input class="form-control"
                       type="text"
                       id="txtUsername"
                       name="txtUsername">

            </div>

            <div class="form-group">

                <label for="txtPassword">
                    Mật khẩu:
                </label>

                <input class="form-control"
                       type="password"
                       id="txtPassword"
                       name="txtPassword">

            </div>

            <input type="submit"
                   value="Đăng nhập"
                   name="sbLogin"
                   id="sbLogin">

            <input type="reset"
                   value="Hủy"
                   name="rsCancel"
                   id="rsCancel">

        </form>
         <a href="../index.html">Quay lại trang chủ</a>
    </div>

</body>

</html>
