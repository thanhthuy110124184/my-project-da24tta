<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Chi tiết sản phẩm</title>
	<link rel="stylesheet" href="../css/style1.css">
	<link rel="stylesheet" href="../css/stylesanpham.css">
</head>
<body>
	<header class="site-header">
		<div class="container">
			<a class="logo" href="index.html">Trang chủ</a>
			<nav class="header-right">
				<a class="cart-link" href="hoadonbanhang.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
			</nav>
		</div>
	</header>

	<main class="container">
		<section class="product-detail">
			<div class="product-image">
				<img id="product-image" src="" alt="">
			</div>
			<div class="product-info">
				<h1 id="product-name">Tên sản phẩm</h1>
				<p id="product-price" class="price">Giá</p>
				<p id="product-tag" class="tag"></p>
				<p id="product-description" class="description"></p>

				<div class="product-actions">
					<button id="add-to-cart" class="btn">Thêm vào giỏ</button>
					<button id="buy-now" class="btn primary">Mua ngay</button>
				</div>
			</div>
		</section>
	</main>

	<script src="../js/data.js"></script>
	<script src="../js/lib.js"></script>
	<script src="../js/chitiet.js"></script>
</body>
</html>
